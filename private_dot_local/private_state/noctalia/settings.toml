config_version = 2

[bar.default]
background_opacity = 0.0
capsule_border = "secondary"
capsule_foreground = "primary"
capsule_opacity = 0.39999999105930328
scale = 1.0500000081956387
start = [ "cpu", "workspaces", "active_window" ]

[control_center.calendar]
show_events_card = false

[dock]
auto_hide = false
icon_size = 28
smart_auto_hide = true

[hooks]
wallpaper_changed = "theme-sync.sh"

[lockscreen_widgets]
enabled = false
schema_version = 2
widget_order = [ "lockscreen-login-box@HDMI-A-1" ]

    [lockscreen_widgets.grid]
    cell_size = 16
    major_interval = 4
    visible = true

    [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1"]
    box_height = 70.0
    box_width = 400.0
    cx = 1130.0
    cy = 1152.0
    output = "HDMI-A-1"
    rotation = 0.0
    type = "login_box"

        [lockscreen_widgets.widget."lockscreen-login-box@HDMI-A-1".settings]
        background_color = "surface_variant"
        background_opacity = 0.88
        background_radius = 12.0
        center_password_text = false
        input_opacity = 1.0
        input_radius = 6.0
        show_caps_lock = true
        show_keyboard_layout = true
        show_login_button = true
        show_password_hint = true

[notification]
layer = "overlay"

[[plugins.source]]
kind = "git"
location = "https://github.com/noctalia-dev/official-plugins"
name = "official"

[[plugins.source]]
kind = "git"
location = "https://github.com/noctalia-dev/community-plugins"
name = "community"

[[plugins.source]]
enabled = false
kind = "path"
location = "~/dev/noctalia"
name = "my-plugins"

[shell]
corner_radius_scale = 2.0

[theme]
builtin = "Ayu"
community_palette = "Cream"
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-content"

    [theme.templates]
    community_ids = [ "pywalfox", "zen-browser", "neovim", "obsidian", "vscode", "opencode", "steam", "yazi" ]

[wallpaper.default]
path = "/home/hhs/Pictures/Wallpapers/minimalist-black-hole.png"

[wallpaper.last]
path = "/home/hhs/Pictures/Wallpapers/minimalist-black-hole.png"

[wallpaper.monitors.HDMI-A-1]
path = "/home/hhs/Pictures/Wallpapers/minimalist-black-hole.png"

[[wallpaper.favorite]]
palette_source = "wallpaper"
path = "/home/hhs/Pictures/Wallpapers/e582ce12efed13df038e98a134ac25d1649d429a25b925eace8e44bc59f3c1b2.png"
theme_mode = "dark"
wallpaper_scheme = "m3-content"

[widget.brightness]
show_label = false

[widget.media]
hide_artist = true
title_scroll = "on_hover"

[widget.network]
show_label = false

[widget.taskbar]
inactive_opacity = 0.80000000000000004
only_active_workspace = true

[widget.volume]
show_label = false