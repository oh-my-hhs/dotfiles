<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- 1. 全局渲染设置 -->
  <match target="font">
    <!-- 抗锯齿（Antialiasing）：开启后文字边缘更平滑 -->
    <edit name="antialias" mode="assign">
      <bool>true</bool>
    </edit>
    <!-- Hinting：优化字体轮廓以匹配像素网格，可选 none/slight/medium/full -->
    <edit name="hinting" mode="assign">
      <bool>true</bool>
    </edit>
    <edit name="hintstyle" mode="assign">
      <const>hintmedium</const>  <!-- 中等强度，平衡清晰度与自然度 -->
    </edit>
    <!-- 亚像素渲染（Subpixel Rendering）：利用 LCD 像素排列提升清晰度 -->
    <!-- 仅适用于 LCD 屏幕，类型：rgb（常见）/bgr/vrgb/vbgr -->
    <edit name="rgba" mode="assign">
      <const>rgb</const>
    </edit>
    <!-- 字体平滑度（Autohint）：自动 hinting，适合无内置 hint 的字体 -->
    <edit name="autohint" mode="assign">
      <bool>false</bool>  <!-- 若字体本身有 hint 数据，关闭自动 hint -->
    </edit>
  </match>
 
  <!-- 2. 默认字体族（Sans/Serif/Monospace） -->
  <match target="pattern">
    <!-- 无衬线字体（默认用于界面、网页） -->
    <test qual="any" name="family">
      <string>LXGW WenKai Medium</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>LXGW WenKai GB Screen</string>
      <string>Noto Sans</string>  <!-- 首选 Noto Sans -->
      <string>DejaVu Sans</string> <!-- 备选 -->
    </edit>
  </match>
 
  <match target="pattern">
    <!-- 衬线字体（默认用于文档） -->
    <test qual="any" name="family">
      <string>serif</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Noto Serif</string>
      <string>DejaVu Serif</string>
    </edit>
  </match>
 
  <match target="pattern">
    <!-- 等宽字体（默认用于终端、代码） -->
    <test qual="any" name="family">
      <string>monospace</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Maple Mono Normal NF CN</string>
      <string>JetBrains Mono</string>  <!-- 编程推荐 -->
      <string>Source Code Pro</string>  <!-- 备选 -->
    </edit>
  </match>
</fontconfig>
